[build]
  publish = "."
  command = ""

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/lift-and-slide-door-repair"
  to = "/specialty-window-door-repair"
  status = 301
  force = true

[[redirects]]
  from = "/lift-and-slide-door-repair.html"
  to = "/specialty-window-door-repair"
  status = 301
  force = true

# Explicit clean-URL rewrites so /sales, /installation, etc. resolve to the
# matching .html file regardless of the Pretty URLs dashboard setting.
[[redirects]]
  from = "/sales"
  to = "/sales.html"
  status = 200

[[redirects]]
  from = "/installation"
  to = "/installation.html"
  status = 200

[[redirects]]
  from = "/service-maintenance"
  to = "/service-maintenance.html"
  status = 200

[[redirects]]
  from = "/projects"
  to = "/projects.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/large-opening-screens"
  to = "/large-opening-screens.html"
  status = 200

[[redirects]]
  from = "/lift-and-slide-door-installation"
  to = "/lift-and-slide-door-installation.html"
  status = 200

[[redirects]]
  from = "/specialty-window-door-repair"
  to = "/specialty-window-door-repair.html"
  status = 200
